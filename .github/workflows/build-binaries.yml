name: Build & Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write  # Needed to upload release assets

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform_key: windows-x86_64
            ext: .exe
            archive: zip

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            platform_key: linux-x86_64
            ext: ""
            archive: tar.gz

          - target: x86_64-apple-darwin
            os: macos-latest
            platform_key: macos-x86_64
            ext: ""
            archive: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            platform_key: macos-aarch64
            ext: ""
            archive: tar.gz

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install musl tools (Linux static builds)
      if: contains(matrix.target, 'musl')
      run: sudo apt-get update && sudo apt-get install -y musl-tools

    - name: Build release binary
      run: cargo build --release --bin titan-node --target ${{ matrix.target }}

    - name: Package (zip - Windows)
      if: matrix.archive == 'zip'
      shell: pwsh
      run: |
        Compress-Archive -Path "target/${{ matrix.target }}/release/titan-node${{ matrix.ext }}" -DestinationPath "titan-node-${{ matrix.platform_key }}.zip"

    - name: Package (tar.gz - Unix)
      if: matrix.archive == 'tar.gz'
      run: |
        tar -czf "titan-node-${{ matrix.platform_key }}.tar.gz" -C "target/${{ matrix.target }}/release" "titan-node${{ matrix.ext }}"

    - name: Upload Release Asset
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: titan-node-${{ matrix.platform_key }}.${{ matrix.archive }}
