<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan — Distributed SQLite</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0B1222;
      --bg-raised: #0F1A2E;
      --bg-input: #081018;
      --border: #1C2E45;
      --border-hi: #2A4060;
      --text: #C8D6E5;
      --text-dim: #5E7A99;
      --text-bright: #FFFFFF;
      --green: #00E68A;
      --green-dim: rgba(0, 230, 138, 0.12);
      --orange: #FF8A50;
      --orange-dim: rgba(255, 138, 80, 0.12);
      --red: #FF5470;
      --red-dim: rgba(255, 84, 112, 0.12);
      --cyan: #00C2FF;
      --cyan-dim: rgba(0, 194, 255, 0.10);
    }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Top Bar ── */
    .topbar {
      height: 52px;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .brand {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--green);
    }
    .brand-sep {
      width: 1px;
      height: 24px;
      background: var(--border);
    }
    .brand-sub {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .cluster-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      font-family: 'Fira Code', monospace;
    }
    .led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 2px var(--red-dim);
      transition: all 0.5s;
    }
    .led.on {
      background: var(--green);
      box-shadow: 0 0 6px var(--green), 0 0 0 2px var(--green-dim);
    }

    /* ── Layout ── */
    .shell {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px 24px;
    }

    /* ── Section Labels ── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    /* ── Node Row ── */
    .node-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 800px) { .node-row { grid-template-columns: 1fr; } }

    .node {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      padding: 16px 18px;
      transition: border-color 0.25s;
    }
    .node:hover { border-color: var(--border-hi); }
    .node.is-leader { border-left: 3px solid var(--green); }
    .node.is-follower { border-left: 3px solid var(--cyan); }
    .node.is-candidate { border-left: 3px solid var(--orange); }
    .node.is-offline { border-left: 3px solid var(--red); opacity: 0.5; }

    .node-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .node-id {
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
    }
    .node-role {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      letter-spacing: 0.5px;
    }
    .node-role.leader { background: var(--green-dim); color: var(--green); }
    .node-role.follower { background: var(--cyan-dim); color: var(--cyan); }
    .node-role.candidate { background: var(--orange-dim); color: var(--orange); }
    .node-role.offline { background: var(--red-dim); color: var(--red); }

    .node-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px 12px;
    }
    .ng-item {
      display: flex;
      flex-direction: column;
    }
    .ng-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .ng-val {
      font-family: 'Fira Code', monospace;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-bright);
    }

    /* ── Panels ── */
    .panel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 800px) { .panel-grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      padding: 16px 18px;
    }
    .panel-head {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .panel-head::before {
      content: '';
      width: 3px;
      height: 12px;
      background: var(--green);
    }

    /* ── SQL Input ── */
    .sql-wrap {
      position: relative;
    }
    .sql-wrap::before {
      content: '$';
      position: absolute;
      left: 12px;
      top: 12px;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      color: var(--green);
      pointer-events: none;
    }
    .sql-box {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-bright);
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      padding: 10px 12px 10px 28px;
      outline: none;
      resize: vertical;
      min-height: 64px;
      transition: border-color 0.2s;
    }
    .sql-box:focus { border-color: var(--green); }
    .sql-box::placeholder { color: var(--text-dim); }

    .btn-strip {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .btn {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 7px 18px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .btn-go {
      background: var(--green);
      color: #0B1222;
    }
    .btn-go:hover { background: #00FF9D; transform: translateY(-1px); }
    .btn-go.read-btn {
      background: var(--cyan);
    }
    .btn-go.read-btn:hover { background: #33D4FF; }
    .btn-clr {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-clr:hover { border-color: var(--border-hi); color: var(--text); }

    /* ── Response ── */
    .resp {
      margin-top: 10px;
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      padding: 8px 12px;
      display: none;
    }
    .resp.ok { display: block; background: var(--green-dim); color: var(--green); border-left: 3px solid var(--green); }
    .resp.err { display: block; background: var(--red-dim); color: var(--red); border-left: 3px solid var(--red); }

    /* ── Table ── */
    .tbl-wrap {
      margin-top: 10px;
      max-height: 280px;
      overflow-y: auto;
    }
    .tbl-wrap table {
      width: 100%;
      border-collapse: collapse;
    }
    .tbl-wrap th {
      text-align: left;
      padding: 6px 10px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-raised);
    }
    .tbl-wrap td {
      padding: 6px 10px;
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      border-bottom: 1px solid rgba(28, 46, 69, 0.5);
      color: var(--text);
    }
    .tbl-wrap tr:hover td { background: rgba(0, 230, 138, 0.03); }
    .tbl-empty {
      text-align: center;
      padding: 20px;
      color: var(--text-dim);
      font-size: 12px;
    }

    /* ── Log ── */
    .logbox {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      padding: 16px 18px;
    }
    .log-scroll {
      max-height: 180px;
      overflow-y: auto;
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.9;
    }
    .log-line { color: var(--text-dim); }
    .log-line .lt { color: #3D5A80; margin-right: 8px; }
    .log-line.ok { color: var(--green); }
    .log-line.err { color: var(--red); }
    .log-line.inf { color: var(--cyan); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <div class="brand">TITAN</div>
      <div class="brand-sep"></div>
      <div class="brand-sub">Distributed SQLite</div>
    </div>
    <div class="cluster-pill">
      <div class="led" id="led"></div>
      <span id="clusterInfo">connecting...</span>
    </div>
  </div>

  <div class="shell">
    <div class="section-label">Cluster Nodes</div>
    <div class="node-row" id="nodeRow"></div>

    <div class="panel-grid">
      <div class="panel">
        <div class="panel-head">Write</div>
        <div class="sql-wrap">
          <textarea class="sql-box" id="wSql" placeholder="INSERT INTO demo (msg) VALUES ('hello')"></textarea>
        </div>
        <div class="btn-strip">
          <button class="btn btn-go" onclick="doWrite()">Execute</button>
          <button class="btn btn-clr" onclick="document.getElementById('wSql').value=''">Clear</button>
        </div>
        <div class="resp" id="wResp"></div>
      </div>
      <div class="panel">
        <div class="panel-head">Read</div>
        <div class="sql-wrap">
          <textarea class="sql-box" id="rSql" placeholder="SELECT * FROM demo"></textarea>
        </div>
        <div class="btn-strip">
          <button class="btn btn-go read-btn" onclick="doRead()">Query</button>
          <button class="btn btn-clr" onclick="document.getElementById('rSql').value=''">Clear</button>
        </div>
        <div class="tbl-wrap" id="rResults"></div>
      </div>
    </div>

    <div class="section-label">Event Log</div>
    <div class="logbox">
      <div class="log-scroll" id="logBox"></div>
    </div>
  </div>

  <script>
    const PORTS = [8001, 8002, 8003];

    function lg(msg, type = '') {
      const el = document.getElementById('logBox');
      const t = new Date().toLocaleTimeString('en-US', {hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
      el.innerHTML = `<div class="log-line ${type}"><span class="lt">${t}</span>${msg}</div>` + el.innerHTML;
      if (el.children.length > 80) el.removeChild(el.lastChild);
    }

    async function getStatus(port) {
      try {
        const r = await fetch(`http://127.0.0.1:${port}/status`, {signal: AbortSignal.timeout(1500)});
        return await r.json();
      } catch { return null; }
    }

    async function findLeader() {
      for (const p of PORTS) {
        const s = await getStatus(p);
        if (s && s.role === 'Leader') return p;
      }
      return null;
    }

    function renderNode(s) {
      if (!s) return '';
      const r = s.role.toLowerCase();
      return `<div class="node is-${r}">
        <div class="node-top">
          <span class="node-id">NODE-${s.node_id}</span>
          <span class="node-role ${r}">${s.role === 'Leader' ? '● ' : ''}${s.role}</span>
        </div>
        <div class="node-grid">
          <div class="ng-item"><span class="ng-label">Term</span><span class="ng-val">${s.term}</span></div>
          <div class="ng-item"><span class="ng-label">Committed</span><span class="ng-val">${s.commit_index}</span></div>
          <div class="ng-item"><span class="ng-label">Applied</span><span class="ng-val">${s.last_applied}</span></div>
          <div class="ng-item"><span class="ng-label">Log Len</span><span class="ng-val">${s.log_length}</span></div>
          <div class="ng-item"><span class="ng-label">UDP</span><span class="ng-val">${s.udp_port}</span></div>
          <div class="ng-item"><span class="ng-label">HTTP</span><span class="ng-val">${s.http_port}</span></div>
        </div>
      </div>`;
    }

    function renderOffline(port) {
      return `<div class="node is-offline">
        <div class="node-top">
          <span class="node-id">NODE-?</span>
          <span class="node-role offline">Offline</span>
        </div>
        <div class="node-grid">
          <div class="ng-item"><span class="ng-label">Port</span><span class="ng-val">${port}</span></div>
        </div>
      </div>`;
    }

    async function poll() {
      let html = '';
      let online = 0;
      let leader = null;
      for (const p of PORTS) {
        const s = await getStatus(p);
        if (s) {
          html += renderNode(s);
          online++;
          if (s.role === 'Leader') leader = s;
        } else {
          html += renderOffline(p);
        }
      }
      document.getElementById('nodeRow').innerHTML = html;
      const led = document.getElementById('led');
      const info = document.getElementById('clusterInfo');
      if (online === 0) {
        led.className = 'led';
        info.textContent = 'offline';
      } else {
        led.className = 'led on';
        info.textContent = `${online}/3 online` + (leader ? ` — leader: node-${leader.node_id}` : ' — electing...');
      }
    }

    async function doWrite() {
      const sql = document.getElementById('wSql').value.trim();
      if (!sql) return;
      const resp = document.getElementById('wResp');
      lg(`exec → ${sql}`, 'inf');

      const lp = await findLeader();
      if (!lp) {
        resp.textContent = 'ERR: no leader found';
        resp.className = 'resp err';
        lg('no leader in cluster', 'err');
        return;
      }
      lg(`routing to leader :${lp}`, 'inf');

      try {
        const r = await fetch(`http://127.0.0.1:${lp}/execute`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({sql}),
        });
        const d = await r.json();
        resp.textContent = d.message;
        resp.className = 'resp ' + (d.success ? 'ok' : 'err');
        lg(d.message, d.success ? 'ok' : 'err');
      } catch (e) {
        resp.textContent = 'connection failed';
        resp.className = 'resp err';
        lg('connection failed: ' + e.message, 'err');
      }
      setTimeout(poll, 400);
    }

    async function doRead() {
      const sql = document.getElementById('rSql').value.trim();
      if (!sql) return;
      const box = document.getElementById('rResults');
      lg(`query → ${sql}`, 'inf');

      const base = window.location.origin;
      try {
        const r = await fetch(`${base}/query?sql=${encodeURIComponent(sql)}`);
        const d = await r.json();
        if (!d.success) { box.innerHTML = `<div class="resp err" style="display:block">${d.error}</div>`; lg(d.error, 'err'); return; }
        if (!d.rows.length) { box.innerHTML = '<div class="tbl-empty">∅ empty result set</div>'; lg('0 rows', 'inf'); return; }

        let h = '<table><tr>';
        (d.columns.length ? d.columns : d.rows[0].map((_,i) => `col${i}`)).forEach(c => h += `<th>${c}</th>`);
        h += '</tr>';
        d.rows.forEach(row => { h += '<tr>' + row.map(v => `<td>${v}</td>`).join('') + '</tr>'; });
        h += '</table>';
        box.innerHTML = h;
        lg(`${d.rows.length} row(s)`, 'ok');
      } catch (e) {
        box.innerHTML = `<div class="resp err" style="display:block">connection failed</div>`;
        lg('query failed: ' + e.message, 'err');
      }
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'Enter') {
        const active = document.activeElement;
        if (active.id === 'wSql') doWrite();
        else if (active.id === 'rSql') doRead();
      }
    });

    poll();
    setInterval(poll, 2000);
    lg('dashboard initialized', 'inf');
  </script>
</body>
</html>
