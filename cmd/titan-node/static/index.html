<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan · Distributed SQLite</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F0E8;
      --bg-alt: #EDE7DB;
      --surface: #FFFFFF;
      --border: #D4C9B8;
      --border-dark: #A89880;
      --text: #1A1410;
      --text-mid: #5C4F3D;
      --text-light: #8C7E6A;
      --accent: #B94A2C;
      --accent-light: rgba(185, 74, 44, 0.08);
      --teal: #1A7A6D;
      --teal-light: rgba(26, 122, 109, 0.08);
      --slate: #3D5467;
      --slate-light: rgba(61, 84, 103, 0.08);
      --warn: #C17A15;
      --warn-light: rgba(193, 122, 21, 0.08);
      --err: #A13333;
      --err-light: rgba(161, 51, 51, 0.08);
    }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .hdr {
      background: var(--surface);
      border-bottom: 2px solid var(--text);
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hdr-left { display: flex; align-items: baseline; gap: 12px; }
    .hdr-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .hdr-tag {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-light);
      border: 1px solid var(--border);
      padding: 2px 8px;
    }
    .hdr-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-mid);
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 2px solid var(--err);
      background: transparent;
      transition: all 0.4s;
    }
    .dot.on {
      border-color: var(--teal);
      background: var(--teal);
    }

    /* ── Shell ── */
    .shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 28px;
    }

    /* ── Section Title ── */
    .sec {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sec::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Nodes ── */
    .nodes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      margin-bottom: 28px;
      border: 2px solid var(--text);
      background: var(--surface);
    }
    @media (max-width: 800px) { .nodes { grid-template-columns: 1fr; } }

    .nd {
      padding: 18px 20px;
      border-right: 1px solid var(--border);
      position: relative;
    }
    .nd:last-child { border-right: none; }

    .nd-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .nd-id {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
    }
    .nd-role {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 10px;
      border: 1.5px solid;
    }
    .nd-role.leader { color: var(--teal); border-color: var(--teal); background: var(--teal-light); }
    .nd-role.follower { color: var(--slate); border-color: var(--slate); background: var(--slate-light); }
    .nd-role.candidate { color: var(--warn); border-color: var(--warn); background: var(--warn-light); }
    .nd-role.offline { color: var(--err); border-color: var(--err); background: var(--err-light); }

    .nd-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px 0;
    }
    .ns {
      display: flex;
      flex-direction: column;
    }
    .ns-k {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-light);
    }
    .ns-v {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .nd-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
    }
    .nd.is-leader .nd-bar { background: var(--teal); }
    .nd.is-follower .nd-bar { background: var(--slate); }
    .nd.is-candidate .nd-bar { background: var(--warn); }
    .nd.is-offline .nd-bar { background: var(--err); }

    /* ── Panels ── */
    .cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    @media (max-width: 800px) { .cols { grid-template-columns: 1fr; } }

    .box {
      background: var(--surface);
      border: 2px solid var(--text);
      padding: 18px 20px;
    }
    .box-title {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-mid);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── SQL Input ── */
    .sqlin {
      width: 100%;
      background: var(--bg-alt);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      padding: 10px 14px;
      resize: vertical;
      min-height: 60px;
      outline: none;
      transition: border-color 0.15s;
    }
    .sqlin:focus { border-color: var(--text); }
    .sqlin::placeholder { color: var(--text-light); }

    .btns {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .b {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 8px 20px;
      border: 2px solid;
      cursor: pointer;
      transition: all 0.12s;
      text-transform: uppercase;
    }
    .b-go {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .b-go:hover { background: #9E3A20; border-color: #9E3A20; }
    .b-read {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }
    .b-read:hover { background: #146358; border-color: #146358; }
    .b-x {
      background: transparent;
      color: var(--text-light);
      border-color: var(--border);
    }
    .b-x:hover { border-color: var(--text-mid); color: var(--text-mid); }

    /* ── Response ── */
    .rsp {
      margin-top: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 8px 12px;
      border-left: 3px solid;
      display: none;
    }
    .rsp.ok { display: block; background: var(--teal-light); color: var(--teal); border-color: var(--teal); }
    .rsp.er { display: block; background: var(--err-light); color: var(--err); border-color: var(--err); }

    /* ── Table ── */
    .tw {
      margin-top: 12px;
      max-height: 260px;
      overflow-y: auto;
    }
    .tw table { width: 100%; border-collapse: collapse; }
    .tw th {
      text-align: left;
      padding: 6px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-light);
      border-bottom: 2px solid var(--text);
      background: var(--bg-alt);
      position: sticky;
      top: 0;
    }
    .tw td {
      padding: 7px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
    }
    .tw tr:hover td { background: var(--accent-light); }
    .tw-empty {
      text-align: center;
      padding: 24px;
      color: var(--text-light);
      font-size: 12px;
      font-style: italic;
    }

    /* ── Log ── */
    .logwrap {
      background: var(--surface);
      border: 2px solid var(--text);
      padding: 18px 20px;
    }
    .logscroll {
      max-height: 160px;
      overflow-y: auto;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      line-height: 2;
    }
    .ll { color: var(--text-light); }
    .ll .t { color: var(--border-dark); margin-right: 10px; }
    .ll.ok { color: var(--teal); }
    .ll.er { color: var(--err); }
    .ll.in { color: var(--slate); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-alt); }
    ::-webkit-scrollbar-thumb { background: var(--border-dark); }
  </style>
</head>
<body>
  <div class="hdr">
    <div class="hdr-left">
      <span class="hdr-name">Titan</span>
      <span class="hdr-tag">v0.2.1 · distributed sqlite</span>
    </div>
    <div class="hdr-status">
      <div class="dot" id="dot"></div>
      <span id="cInfo">connecting</span>
    </div>
  </div>

  <div class="shell">
    <div class="sec">Cluster</div>
    <div class="nodes" id="nRow"></div>

    <div class="cols">
      <div class="box">
        <div class="box-title">Write</div>
        <textarea class="sqlin" id="wSql" placeholder="INSERT INTO demo (msg) VALUES ('hello')"></textarea>
        <div class="btns">
          <button class="b b-go" onclick="doWrite()">Execute</button>
          <button class="b b-x" onclick="document.getElementById('wSql').value=''">Clear</button>
        </div>
        <div class="rsp" id="wR"></div>
      </div>
      <div class="box">
        <div class="box-title">Read</div>
        <textarea class="sqlin" id="rSql" placeholder="SELECT * FROM demo"></textarea>
        <div class="btns">
          <button class="b b-read" onclick="doRead()">Query</button>
          <button class="b b-x" onclick="document.getElementById('rSql').value=''">Clear</button>
        </div>
        <div class="tw" id="rR"></div>
      </div>
    </div>

    <div class="sec">Log</div>
    <div class="logwrap">
      <div class="logscroll" id="log"></div>
    </div>
  </div>

  <script>
    // Auto-detect host from current URL
    const BASE = window.location.origin;
    const HOST = window.location.hostname;
    const BASE_HTTP = 8000;
    const P = [BASE_HTTP + 1, BASE_HTTP + 2, BASE_HTTP + 3];

    function lg(m, c = '') {
      const el = document.getElementById('log');
      const t = new Date().toLocaleTimeString('en-GB');
      el.innerHTML = `<div class="ll ${c}"><span class="t">${t}</span>${m}</div>` + el.innerHTML;
      if (el.children.length > 60) el.removeChild(el.lastChild);
    }

    async function stat(p) {
      try {
        const url = `${window.location.protocol}//${HOST}:${p}/status`;
        const r = await fetch(url, {signal: AbortSignal.timeout(1500)});
        return await r.json();
      } catch { return null; }
    }

    async function leader() {
      for (const p of P) { const s = await stat(p); if (s?.role === 'Leader') return p; }
      return null;
    }

    function ndHTML(s) {
      const r = s.role.toLowerCase();
      return `<div class="nd is-${r}">
        <div class="nd-top">
          <span class="nd-id">#${s.node_id}</span>
          <span class="nd-role ${r}">${s.role}</span>
        </div>
        <div class="nd-stats">
          <div class="ns"><span class="ns-k">Term</span><span class="ns-v">${s.term}</span></div>
          <div class="ns"><span class="ns-k">Commit</span><span class="ns-v">${s.commit_index}</span></div>
          <div class="ns"><span class="ns-k">Applied</span><span class="ns-v">${s.last_applied}</span></div>
          <div class="ns"><span class="ns-k">Log</span><span class="ns-v">${s.log_length}</span></div>
          <div class="ns"><span class="ns-k">UDP</span><span class="ns-v">${s.udp_port}</span></div>
          <div class="ns"><span class="ns-k">HTTP</span><span class="ns-v">${s.http_port}</span></div>
        </div>
        <div class="nd-bar"></div>
      </div>`;
    }

    function offHTML(p) {
      return `<div class="nd is-offline">
        <div class="nd-top">
          <span class="nd-id">:${p}</span>
          <span class="nd-role offline">Offline</span>
        </div>
        <div class="nd-stats"><div class="ns"><span class="ns-k">Status</span><span class="ns-v">—</span></div></div>
        <div class="nd-bar"></div>
      </div>`;
    }

    async function poll() {
      let h = '', on = 0, ldr = null;
      for (const p of P) {
        const s = await stat(p);
        if (s) { h += ndHTML(s); on++; if (s.role === 'Leader') ldr = s; }
        else h += offHTML(p);
      }
      document.getElementById('nRow').innerHTML = h;
      document.getElementById('dot').className = 'dot' + (on ? ' on' : '');
      document.getElementById('cInfo').textContent = on ? `${on}/3 online` + (ldr ? ` · leader #${ldr.node_id}` : ' · election') : 'offline';
    }

    async function doWrite() {
      const sql = document.getElementById('wSql').value.trim();
      if (!sql) return;
      const r = document.getElementById('wR');
      lg(`write → ${sql}`, 'in');

      const lp = await leader();
      if (!lp) { r.textContent = 'No leader found'; r.className = 'rsp er'; lg('no leader', 'er'); return; }
      lg(`→ leader :${lp}`, 'in');

      try {
        const ldrUrl = `${window.location.protocol}//${HOST}:${lp}/execute`;
        const res = await fetch(ldrUrl, {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({sql}),
        });
        const d = await res.json();
        r.textContent = d.message;
        r.className = 'rsp ' + (d.success ? 'ok' : 'er');
        lg(d.message, d.success ? 'ok' : 'er');
      } catch (e) {
        r.textContent = 'failed'; r.className = 'rsp er';
        lg(e.message, 'er');
      }
      setTimeout(poll, 400);
    }

    async function doRead() {
      const sql = document.getElementById('rSql').value.trim();
      if (!sql) return;
      const box = document.getElementById('rR');
      lg(`read → ${sql}`, 'in');
      try {
        const res = await fetch(`${window.location.origin}/query?sql=${encodeURIComponent(sql)}`);
        const d = await res.json();
        if (!d.success) { box.innerHTML = `<div class="rsp er" style="display:block">${d.error}</div>`; lg(d.error, 'er'); return; }
        if (!d.rows.length) { box.innerHTML = '<div class="tw-empty">No rows</div>'; lg('0 rows', 'in'); return; }
        let t = '<table><tr>';
        (d.columns.length ? d.columns : d.rows[0].map((_,i) => i)).forEach(c => t += `<th>${c}</th>`);
        t += '</tr>';
        d.rows.forEach(row => { t += '<tr>' + row.map(v => `<td>${v}</td>`).join('') + '</tr>'; });
        t += '</table>';
        box.innerHTML = t;
        lg(`${d.rows.length} row(s)`, 'ok');
      } catch (e) {
        box.innerHTML = `<div class="rsp er" style="display:block">failed</div>`;
        lg(e.message, 'er');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'Enter') {
        if (document.activeElement?.id === 'wSql') doWrite();
        else if (document.activeElement?.id === 'rSql') doRead();
      }
    });

    poll();
    setInterval(poll, 2000);
    lg('ready', 'ok');
  </script>
</body>
</html>
